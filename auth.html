<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | LabourNow</title>
    <meta name="description" content="Sign in or Sign up to book verified workers.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <!-- Simple Nav -->
    <nav class="navbar scrolled">
        <div class="container nav-content text-center" style="justify-content: center;">
            <a href="index.html" class="logo">Labour<span>Now</span></a>
        </div>
    </nav>

    <!-- Auth Container -->
    <div class="auth-wrapper">
        <div class="auth-card block-reveal">
            
            <div class="auth-tabs">
                <button class="auth-tab active" data-target="signin">Sign In</button>
                <button class="auth-tab" data-target="signup">Sign Up</button>
            </div>

            <!-- Sign In Form -->
            <form id="signin-form" class="auth-form active">
                <div class="text-center" style="margin-bottom: 2rem;">
                    <h2>Welcome Back</h2>
                    <p class="section-subtitle" style="margin-bottom: 0;">Sign in to continue booking.</p>
                </div>
                
                <div class="form-group">
                    <label for="signin-email">Email Address</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signin-email" placeholder="you@example.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="signin-password">Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signin-password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" checked>
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-large">Sign In</button>
                
                <div class="auth-divider"><span>OR</span></div>
                
                <button type="button" class="btn btn-outline w-100 social-btn">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google" width="20">
                    Continue with Google
                </button>
            </form>

            <!-- Sign Up Form -->
            <form id="signup-form" class="auth-form" style="display: none;">
                <div class="text-center" style="margin-bottom: 2rem;">
                    <h2>Create an Account</h2>
                    <p class="section-subtitle" style="margin-bottom: 0;">Join LabourNow to find trusted workers.</p>
                </div>
                
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signup-name" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signup-email" placeholder="you@example.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signup-password" placeholder="Create a password" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" required>
                        <span>I agree to the <a href="#" class="forgot-link">Terms & Conditions</a></span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-large">Create Account</button>
                
                <div class="auth-divider"><span>OR</span></div>
                
                <button type="button" class="btn btn-outline w-100 social-btn">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google" width="20">
                    Sign up with Google
                </button>
            </form>

        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Specific Auth Logic to capture service parameters and navigate
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const service = urlParams.get('service');
            
            // Handle form submissions to mimic moving to booking page
            const proceedToBooking = (e) => {
                e.preventDefault(); 
                let redirectUrl = 'booking.html';
                if(service) {
                    redirectUrl += '?service=' + encodeURIComponent(service);
                }
                window.location.href = redirectUrl;
            };

            document.getElementById('signin-form').addEventListener('submit', proceedToBooking);
            document.getElementById('signup-form').addEventListener('submit', proceedToBooking);
            
            // Social buttons also redirect directly for demo
            document.querySelectorAll('.social-btn').forEach(btn => {
                btn.addEventListener('click', proceedToBooking);
            });
        });
    </script>
</body>
</html>
